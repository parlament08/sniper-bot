services:
  analyzer:
    image: sniper-bot:local
    build: .
    container_name: sniper_analyzer
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SCAN_JOURNAL_ENABLED=${SCAN_JOURNAL_ENABLED:-true}
      - SCAN_JOURNAL_DIR=/app/data/journal
      - TZ=Europe/Chisinau
    volumes:
      - ./data:/app/data
    command: python -u analyzer.py

  listener:
    image: sniper-bot:local
    build: .
    container_name: sniper_listener
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SCAN_JOURNAL_ENABLED=${SCAN_JOURNAL_ENABLED:-true}
      - SCAN_JOURNAL_DIR=/app/data/journal
      - TZ=Europe/Chisinau
    volumes:
      - ./data:/app/data
    command: python -u tg_listener.py
